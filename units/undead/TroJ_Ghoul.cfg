#define BASE_UNIT_REPLACEMENT BASE_UNIT NEXT_UNIT DESCRIPTION
    [unit_type]
        [base_unit]
            id={BASE_UNIT}
        [/base_unit]
        id={BASE_UNIT}+"TRoJ"
        advances_to={NEXT_UNIT}
		description={DESCRIPTION}
    [/unit_type]
#enddef
{BASE_UNIT_REPLACEMENT "Saurian Ghoul" "Saurian FlayerTRoJ","Saurian RunnerTRoJ" "Early attempts to apply traditional necromancy to saurians often resulted in grotesque failures. Because the unique bone structure of these creatures was not fully understood, the reanimated flesh frequently decayed and refused to bond properly with the skeleton. What remains is a poisonous, lumbering mass of saurian flesh, a failed experiment that is no less dangerous for its instability."}
{BASE_UNIT_REPLACEMENT "Saurian Flayer" "Saurian Undead StalkerTRoJ" "The Saurian Flayer is a mutation born of necessity, appearing when Ghouls are left abandoned in toxic swamps. Over time, their unstable forms adapt to the rot, learning to vanish into the muck and transform their own necrotic saliva into a corrosive, poisonous acid. This environmental adaptation has turned a failed experiment into a dangerous success."}
{BASE_UNIT_REPLACEMENT "Saurian Undead Stalker" "null" "The Saurian Stalker is the ultimate evolution of the Flayer, having fully adapted its unliving form to the art of the ambush. These creatures have perfected the production of corrosive acid and can vanish into almost any environment, whether it be the depths of a swamp, the sands of a desert, or the shadows of a cave. They strike with absolute precision, emerging from hiding to end their prey before they are even detected."}
{BASE_UNIT_REPLACEMENT "Saurian Runner" "Saurian SprinterTRoJ" "A Saurian Runner is the result of a Saurian Ghoul's necrotic muscles becoming hyper-developed through constant, frenetic movement. They possess incredible speed but lack control, often careening into battle at such velocities that they cannot stop before impact. This makes them as unpredictable as they are lethal on the battlefield."}
{BASE_UNIT_REPLACEMENT "Saurian Sprinter" "null" "The Saurian Sprinter represents the perfected form of the Runner. Having finally mastered the overwhelming velocity of its predecessor, it now strikes with surgical precision and total control over its every movement. These creatures are no longer just fast; they are terrifyingly accurate killers capable of delivering swift, lethal blows."}